<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Browsing Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wide">📦 Scalable Product Browser</h1>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="Search products..." 
                    class="bg-white text-gray-900 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 w-full sm:w-64 shadow-inner">
                
                <select id="categorySelect" class="bg-white text-gray-900 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 shadow-inner">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Home & Kitchen">Home & Kitchen</option>
                    <option value="Books">Books</option>
                </select>

                <button id="searchBtn" class="bg-blue-800 hover:bg-blue-900 text-white font-semibold px-5 py-2 rounded-lg transition-all duration-200 shadow">
                    Search
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6 text-gray-600 text-sm font-medium">
            Total Products Found: <span id="totalCount" class="text-blue-600 font-bold">0</span>
        </div>

        <div id="loading" class="text-center py-12 text-lg font-semibold text-gray-500 hidden">
            ⏳ Loading awesome products...
        </div>
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <div class="flex justify-center items-center gap-4 mt-12">
            <button id="prevBtn" class="bg-white hover:bg-gray-100 text-gray-700 font-bold py-2 px-5 border border-gray-300 rounded-lg shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed">
                ⬅️ Previous
            </button>
            <span class="text-sm font-medium text-gray-700">
                Page <span id="currentPage" class="font-bold text-blue-600">1</span>
            </span>
            <button id="nextBtn" class="bg-white hover:bg-gray-100 text-gray-700 font-bold py-2 px-5 border border-gray-300 rounded-lg shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed">
                Next ➡️
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
