<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Browsing Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <header class="bg-blue-600 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wide">📦 Scalable Product Browser</h1>
            
            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <input type="text" id="searchInput" placeholder="Search products..." 
                    class="bg-white text-gray-900 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 w-full sm:w-64 shadow-inner">
                
                <select id="categorySelect" class="bg-white text-gray-900 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300 shadow-inner">
                    <option value="">All Categories</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Beauty">Beauty</option>
                    <option value="Home & Kitchen">Home & Kitchen</option>
                    <option value="Books">Books</option>
                </select>

                <button id="searchBtn" class="bg-blue-800 hover:bg-blue-900 text-white font-semibold px-5 py-2 rounded-lg transition-all duration-200 shadow">
                    Search
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6 text-gray-600 text-sm font-medium">
            Total Products Found: <span id="totalCount" class="text-blue-600 font-bold">0</span>
        </div>

        <div id="loading" class="text-center py-12 text-lg font-semibold text-gray-500 hidden">
            ⏳ Loading awesome products...
        </div>
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>

        <div class="flex justify-center items-center gap-4 mt-12">
            <button id="prevBtn" class="bg-white hover:bg-gray-100 text-gray-700 font-bold py-2 px-5 border border-gray-300 rounded-lg shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed">
                ⬅️ Previous
            </button>
            <span class="text-sm font-medium text-gray-700">
                Page <span id="currentPage" class="font-bold text-blue-600">1</span>
            </span>
            <button id="nextBtn" class="bg-white hover:bg-gray-100 text-gray-700 font-bold py-2 px-5 border border-gray-300 rounded-lg shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed">
                Next ➡️
            </button>
        </div>
    </main>

    <script>
        const API_BASE_URL = "https://scalable-product-browsing-backend.onrender.com/api/products";
        let currentOffset = 0;
        const limit = 12; // UI par 12 items ek saath sahi lagte hain

        // DOM Elements
        const productsGrid = document.getElementById('productsGrid');
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const searchBtn = document.getElementById('searchBtn');
        const totalCountSpan = document.getElementById('totalCount');
        const currentPageSpan = document.getElementById('currentPage');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const loadingDiv = document.getElementById('loading');

        // Fetch Data from Live Render Backend
        async function fetchProducts() {
            loadingDiv.classList.remove('hidden');
            productsGrid.innerHTML = '';
            
            const searchValue = searchInput.value.trim();
            const categoryValue = categorySelect.value;

            // URL Builder dynamically mapping query parameters
            let url = `${API_BASE_URL}?limit=${limit}&offset=${currentOffset}`;
            if (searchValue) url += `&search=${encodeURIComponent(searchValue)}`;
            if (categoryValue) url += `&category=${encodeURIComponent(categoryValue)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                totalCountSpan.innerText = data.total.toLocaleString();
                renderCards(data.results);
                updatePaginationControls(data.total);
            } catch (error) {
                console.error("Error fetching data:", error);
                productsGrid.innerHTML = `<p class="col-span-full text-center text-red-500 font-semibold py-8">⚠️ Failed to load products. Render server might be sleeping. Please try again.</p>`;
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }

        // Render Cards dynamically with sample dynamic graphics placeholders
        function renderCards(products) {
            if (!products || products.length === 0) {
                productsGrid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-12">No products matched your criteria.</p>`;
                return;
            }

            productsGrid.innerHTML = products.map(product => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between border border-gray-100">
                    <div class="p-5">
                        <div class="text-xs font-bold uppercase tracking-wide text-blue-500 mb-1">${product.category}</div>
                        <h3 class="text-base font-bold text-gray-900 mb-2 line-clamp-2">${product.name}</h3>
                        <p class="text-xs text-gray-400">ID: #${product.id}</p>
                    </div>
                    <div class="px-5 pb-5 pt-2 flex items-center justify-between bg-gray-50 border-t border-gray-50">
                        <span class="text-lg font-extrabold text-green-600">$${parseFloat(product.price).toFixed(2)}</span>
                        <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-1.5 rounded-md transition shadow-sm">View details</button>
                    </div>
                </div>
            `).join('');
        }

        function updatePaginationControls(total) {
            currentPageSpan.innerText = Math.floor(currentOffset / limit) + 1;
            prevBtn.disabled = currentOffset === 0;
            nextBtn.disabled = (currentOffset + limit) >= total;
        }

        // Event Listeners
        searchBtn.addEventListener('click', () => {
            currentOffset = 0; // Reset to page 1 on new search
            fetchProducts();
        });

        prevBtn.addEventListener('click', () => {
            if (currentOffset >= limit) {
                currentOffset -= limit;
                fetchProducts();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        nextBtn.addEventListener('click', () => {
            currentOffset += limit;
            fetchProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Initial Load on opening
        fetchProducts();
    </script>
</body>
</html>
